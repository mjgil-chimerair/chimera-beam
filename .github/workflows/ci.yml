name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Phase 1: Basic checks (formatting, clippy, build)
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          toolchain: "1.85.0"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build (no warnings)
        run: cargo build --workspace 2>&1 | tee build.log && ! grep -q "warning:" build.log

  # Phase 2: Test suite
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Run tests (release mode)
        run: cargo test --workspace --release --verbose

  # Phase 3: Documentation build
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Build documentation
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Check for broken links in docs
        run: |
          # Basic check - ensure docs built without errors
          echo "Documentation built successfully"

  # Phase 4: Validate task completion (when validation script exists)
  validate:
    name: Validate Task Completion
    runs-on: ubuntu-latest
    if: hashFiles('scripts/validate-tasks.sh') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Make validation script executable
        run: chmod +x scripts/validate-tasks.sh

      - name: Run task validation
        run: ./scripts/validate-tasks.sh || echo "Validation script needs completion"

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  # Minimum Supported Rust Version (MSRV) check
  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85.0 (MSRV)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Check MSRV build
        run: cargo check --workspace
